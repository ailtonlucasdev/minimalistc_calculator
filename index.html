<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalistic Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <!-- título do site -->
      <h1>Calculadora Minimalista Online</h1>
    </header>

    <div class="container">
      <div class="calculator_container">
        <div class="calculator">
          <!-- corpo da calculadora -->
          <div class="display">
            <input type="text" id="operations" />
            <!-- todas as operações -->
            <input type="text" id="result" />
            <!-- resultado final -->
          </div>
          <div class="keyboard">
             <!-- primeira linha de teclas -->
              <input type="button" class="key" value="C" onclick="operations.value = '' "/>
              <button class="key delete" onclick="back()">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="34"
                  height="38"
                  viewBox="0 0 24 24"
                >
                  <path
                    fill="currentColor"
                    d="M7.378 5.531a2.75 2.75 0 0 1 1.92-.781h10.297c.598 0 1.294.166 1.863.519c.579.358 1.11.974 1.11 1.856v9.75c0 .882-.531 1.497-1.11 1.856a3.65 3.65 0 0 1-1.863.519H9.298a2.75 2.75 0 0 1-1.92-.781l-5.35-5.216a1.75 1.75 0 0 1 0-2.506zM14.03 9.47a.75.75 0 1 0-1.06 1.06L14.44 12l-1.47 1.47a.75.75 0 1 0 1.06 1.06l1.47-1.47l1.47 1.47a.75.75 0 1 0 1.06-1.06L16.56 12l1.47-1.47a.75.75 0 1 0-1.06-1.06l-1.47 1.47z"
                  />
                </svg>
              </button>
              <input type="button" class="key" value="(" onclick="operations.value += '(' "/>
              <input type="button" class="key" value=")" onclick="operations.value += ')' "/>
              <input type="button" class="key" value="%" onclick="operations.value += '%' "/>
            
              <!-- segunda linha de teclas -->
              <input type="button" class="key numbers" value="7" onclick="operations.value += '7' "/>
              <input type="button" class="key numbers" value="8" onclick="operations.value += '8' "/>
              <input type="button" class="key numbers" value="9" onclick="operations.value += '9' "/>
              <input type="button" class="key maths" value="÷" onclick="operations.value += '/' "/>
              <input type="button" class="key" value="√" onclick="operations.value += 'Math.sqrt()' "/>
           
              <!-- terceira linha de teclas -->
              <input type="button" class="key numbers" value="4" onclick="operations.value += '4' "/>
              <input type="button" class="key numbers" value="5" onclick="operations.value += '5' "/>
              <input type="button" class="key numbers" value="6" onclick="operations.value += '6' "/>
              <input type="button" class="key maths" value="x" onclick="operations.value += '*' "/>
              <input type="button" class="key" value="x²" onclick="operations.value += '**2' "/>
           
              <!-- quarta linha de teclas -->
              <input type="button" class="key numbers" value="1" onclick="operations.value += '1' "/>
              <input type="button" class="key numbers" value="2" onclick="operations.value += '2' "/>
              <input type="button" class="key numbers" value="3" onclick="operations.value += '3' "/>
              <input type="button" class="key maths" value="-" onclick="operations.value += '-' "/>
              <input type="button" class="key equal" value="=" />
              <!-- botão igual -->
         
              <!-- quinta linha de teclas -->
              <input type="button" class="key" value="." onclick="operations.value += '.' "/>
              <input type="button" class="key numbers" value="0" onclick="operations.value += '0' "/>
              <input type="button" class="key" value="00" onclick="operations.value += '00' "/>
              <input type="button" class="key maths" value="+" onclick="operations.value += '+' "/>
            </div>
          </div>
      </div>
    </div>
    </div>

    <footer>
      <!-- rodapé do site -->
      <p>Projeto DEV feito com html, css e javascript</p>
    </footer>

    <script src="script.js"></script>
    <!-- adicionando script externo -->
  </body>
</html>
