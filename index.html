<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalistic Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <!-- título do site -->
      <h1>Calculadora Minimalista Online</h1>
    </header>

    <div class="container">
      <form>
        <div class="calculator">
          <!-- corpo da calculadora -->
          <div class="display">
            <input type="text" id="operations" />
            <!-- todas as operações -->
            <input type="text" id="result" />
            <!-- resultado final -->
          </div>

          <div>
            <!-- primeira linha de teclas -->
            <input type="button" value="C" />
            <input type="button" value="BC" />
            <input type="button" value="(" />
            <input type="button" value=")" />
            <input type="button" value="%" />
          </div>
          <div>
            <!-- segunda linha de teclas -->
            <input type="button" value="7" />
            <input type="button" value="8" />
            <input type="button" value="9" />
            <input type="button" value="÷" />
            <input type="button" value="√" />
          </div>
          <div>
            <!-- terceira linha de teclas -->
            <input type="button" value="4" />
            <input type="button" value="5" />
            <input type="button" value="6" />
            <input type="button" value="x" />
            <input type="button" value="x²" />
          </div>
          <div>
            <!-- quarta linha de teclas -->
            <input type="button" value="1" />
            <input type="button" value="2" />
            <input type="button" value="3" />
            <input type="button" value="-" />
            <input type="button" value="=" />
            <!-- botão igual -->
          </div>
          <div>
            <!-- quinta linha de teclas -->
            <input type="button" value="." />
            <input type="button" value="0" />
            <input type="button" value="00" />
            <input type="button" value="+" />
          </div>
        </div>
      </form>
    </div>

    <footer>
      <!-- rodapé do site -->
      <p>Projeto DEV feito com html, css e javascript</p>
    </footer>
  </body>
</html>
